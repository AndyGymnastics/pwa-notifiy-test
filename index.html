<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Min Push PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 80%; max-width: 400px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #007aff; color: white; border: none; font-weight: bold; cursor: pointer; }
        #status { font-size: 0.8rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
<div class="card">
    <h1>Push-test</h1>
    <input type="text" id="userName" placeholder="Skriv ditt namn...">
    <button onclick="saveName()">Spara Namn</button>
    <hr>
    <button id="pushBtn" onclick="setupPush()">Aktivera Notiser</button>
    <div id="status">Status: Väntar...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBlF6dpSbScv4MbkJS5Ue8KnoftoWy-iVk",
    authDomain: "minpushapp-52967.firebaseapp.com",
    projectId: "minpushapp-52967",
    storageBucket: "minpushapp-52967.firebasestorage.app",
    messagingSenderId: "907285496319",
    appId: "1:907285496319:web:f74796cb70ecc9fe2ee7ca"
  };

  firebase.initializeApp(firebaseConfig);
  const messaging = firebase.messaging();

  document.getElementById('userName').value = localStorage.getItem('pwaName') || '';

  function saveName() {
    localStorage.setItem('pwaName', document.getElementById('userName').value);
    alert('Namnet sparat!');
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./firebase-messaging-sw.js')
      .then(() => console.log("Firebase SW registrerad!"))
      .catch((err) => console.error("SW-fel:", err));
  }

  async function setupPush() {
    const statusDiv = document.getElementById('status');
    try {
      if ('setAppBadge' in navigator) await navigator.setAppBadge(0);

      const registration = await navigator.serviceWorker.ready;

      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        const currentToken = await messaging.getToken({
          vapidKey: 'BIHVoqhzP8sqRHXPgqTEXkhrMbper-v_2k3nDWbNLYcWmz-H42lk_w8ddchHpAtM54DAOeDnvTBF47gQmX3TOx0',
          serviceWorkerRegistration: registration
        });
      if (currentToken) {
         statusDiv.innerText = "Token: " + currentToken;
      }
      } else {
        statusDiv.innerText = "Notiser nekade.";
      }
    } catch (err) {
      statusDiv.innerText = "Felmeddelande: " + err.message;
      console.error(err);
    }
  }
</script>
</body>
</html>
